spring.application.name=inventario

# Expone el mensaje real de las excepciones en la respuesta de error (ej. "Credenciales invalidas",
# "El activo no esta disponible para asignar") en vez del 500 generico por defecto de Spring Boot.
server.error.include-message=always

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_LINK}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Carpeta con las plantillas PDF de actas (AcroForm). Rutas relativas al
# directorio de trabajo del proceso (backend/ si se corre con mvn spring-boot:run).
app.actas.plantillas-dir=plantillas/actas
# Carpeta donde se guardan las actas ya rellenadas: {oficina}/{nombre apellido}/{entrega|devolucion}/acta-{id}.pdf
app.actas.generadas-dir=actas-generadas
